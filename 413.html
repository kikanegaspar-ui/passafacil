{% extends "base.html" %}
{% block title %}Ficheiro demasiado grande — AgroMercado{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="text-8xl mb-6">📁</div>
    <h1 class="font-display text-6xl font-bold text-harvest-500 mb-2">413</h1>
    <h2 class="font-display text-2xl text-gray-700 mb-4">Ficheiro demasiado grande</h2>
    <p class="text-gray-500 mb-8">
      O tamanho máximo permitido é 4 MB. Por favor, reduza o tamanho do ficheiro e tente novamente.
    </p>
    <button onclick="history.back()"
       class="inline-flex items-center gap-2 bg-forest-600 hover:bg-forest-700 text-white font-bold px-8 py-3.5 rounded-full transition-colors">
      ← Voltar
    </button>
  </div>
</div>
{% endblock %}
