{% extends "base.html" %}
{% block title %}Entrar — AgroMercado{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">

    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">

      <!-- Header -->
      <div class="bg-gradient-to-br from-forest-700 to-forest-800 px-8 py-8 text-center">
        <div class="text-4xl mb-2">🌾</div>
        <h1 class="font-display text-2xl text-white font-bold">Bem-vindo de volta</h1>
        <p class="text-forest-300 text-sm mt-1">Aceda à sua conta AgroMercado</p>
      </div>

      <form method="POST" action="{{ url_for('auth.login') }}" class="px-8 py-8 space-y-5" novalidate>

        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
          <input type="email" id="email" name="email" value="{{ email }}"
                 required autofocus autocomplete="email"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="o-seu@email.ao" />
        </div>

        <div>
          <div class="flex items-center justify-between mb-1">
            <label for="password" class="text-sm font-semibold text-gray-700">Senha</label>
          </div>
          <input type="password" id="password" name="password"
                 required autocomplete="current-password"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="A sua senha" />
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" id="remember" name="remember" value="1"
                 class="w-4 h-4 rounded text-forest-600 focus:ring-forest-400 border-gray-300 cursor-pointer" />
          <label for="remember" class="text-sm text-gray-600 cursor-pointer">Manter sessão iniciada</label>
        </div>

        <button type="submit"
                class="w-full bg-forest-600 hover:bg-forest-700 active:bg-forest-800 text-white font-bold py-3.5 rounded-xl transition-colors shadow-md">
          Entrar
        </button>

        <p class="text-center text-sm text-gray-500">
          Não tem conta?
          <a href="{{ url_for('auth.register') }}" class="text-forest-600 font-semibold hover:underline">Registar</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
