{% extends "base.html" %}
{% block title %}Criar Conta — AgroMercado{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">

      <!-- Header -->
      <div class="bg-gradient-to-br from-forest-700 to-forest-800 px-8 py-8 text-center">
        <div class="text-4xl mb-2">🌾</div>
        <h1 class="font-display text-2xl text-white font-bold">Criar Conta</h1>
        <p class="text-forest-300 text-sm mt-1">Junte-se ao AgroMercado Angola</p>
      </div>

      <form method="POST" action="{{ url_for('auth.register') }}" class="px-8 py-8 space-y-5" novalidate>

        <!-- Account Type Toggle -->
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">
            Tipo de conta
          </label>
          <div class="grid grid-cols-2 gap-3">
            <label class="role-option cursor-pointer">
              <input type="radio" name="role" value="buyer"
                     {{ 'checked' if form.get('role','buyer') == 'buyer' }}
                     class="sr-only peer" />
              <div class="flex flex-col items-center gap-1 border-2 rounded-2xl py-3 px-2 text-center transition-all
                          border-gray-200 peer-checked:border-forest-500 peer-checked:bg-forest-50">
                <span class="text-2xl">🧑‍🌾</span>
                <span class="text-xs font-semibold text-gray-700">Comprador / Agricultor</span>
              </div>
            </label>
            <label class="role-option cursor-pointer">
              <input type="radio" name="role" value="seller"
                     {{ 'checked' if form.get('role') == 'seller' }}
                     class="sr-only peer" />
              <div class="flex flex-col items-center gap-1 border-2 rounded-2xl py-3 px-2 text-center transition-all
                          border-gray-200 peer-checked:border-forest-500 peer-checked:bg-forest-50">
                <span class="text-2xl">🏪</span>
                <span class="text-xs font-semibold text-gray-700">Vendedor / Loja</span>
              </div>
            </label>
          </div>
        </div>

        <!-- Name -->
        <div>
          <label for="name" class="block text-sm font-semibold text-gray-700 mb-1">Nome completo</label>
          <input type="text" id="name" name="name" value="{{ form.get('name','') }}"
                 required autocomplete="name"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="João Silva" />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">E-mail</label>
          <input type="email" id="email" name="email" value="{{ form.get('email','') }}"
                 required autocomplete="email"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="joao@exemplo.ao" />
        </div>

        <!-- Phone (WhatsApp) -->
        <div>
          <label for="phone" class="block text-sm font-semibold text-gray-700 mb-1">
            WhatsApp
            <span class="font-normal text-gray-400">(vendedores: obrigatório)</span>
          </label>
          <input type="tel" id="phone" name="phone" value="{{ form.get('phone','') }}"
                 autocomplete="tel"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="+244 9XX XXX XXX" />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Senha</label>
          <input type="password" id="password" name="password"
                 required autocomplete="new-password" minlength="6"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="Mínimo 6 caracteres" />
        </div>

        <!-- Confirm Password -->
        <div>
          <label for="confirm_password" class="block text-sm font-semibold text-gray-700 mb-1">Confirmar senha</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 required autocomplete="new-password"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-forest-400 transition-shadow"
                 placeholder="Repetir senha" />
        </div>

        <button type="submit"
                class="w-full bg-forest-600 hover:bg-forest-700 active:bg-forest-800 text-white font-bold py-3.5 rounded-xl transition-colors shadow-md mt-2">
          Criar conta
        </button>

        <p class="text-center text-sm text-gray-500">
          Já tem conta?
          <a href="{{ url_for('auth.login') }}" class="text-forest-600 font-semibold hover:underline">Entrar</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
