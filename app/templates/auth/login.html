{% extends "base.html" %}
{% block title %}Entrar — AgroCAD{% endblock %}
{% block content %}
<div class="min-h-[85vh] flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <svg width="52" height="52" viewBox="0 0 34 34" fill="none" class="mx-auto mb-4">
        <rect width="34" height="34" rx="10" fill="url(#alg)"/>
        <path d="M10 24 L10 14 L17 10 L17 17 L13 19 L13 24Z" fill="#2a9d8f"/>
        <path d="M17 10 L24 14 L24 24 L20 24 L20 19 L17 17Z" fill="#1a3a6b"/>
        <path d="M13 19 L17 17 L20 19 L20 24 L13 24Z" fill="#145e57"/>
        <path d="M17 10 C17 10 15 6 18 4 C21 2 22 5 20 7 C19 8 18 9 17 10Z" fill="#2ecc71"/>
        <defs><linearGradient id="alg" x1="0" y1="0" x2="34" y2="34"><stop offset="0%" stop-color="#0f1d30"/><stop offset="100%" stop-color="#162640"/></linearGradient></defs>
      </svg>
      <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.5rem;color:white;letter-spacing:-.02em;">Bem-vindo de volta</h1>
      <p class="text-sm mt-1.5" style="color:rgba(255,255,255,.4);">Aceda à sua conta AgroCAD</p>
    </div>

    <div class="rounded-2xl p-8" style="background:#0f1d30;border:1px solid rgba(255,255,255,.08);">
      <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-5" novalidate>
        <div>
          <label for="email" class="block text-xs font-semibold uppercase tracking-widest mb-2" style="color:rgba(255,255,255,.4);letter-spacing:.1em;">E-mail</label>
          <input type="email" id="email" name="email" value="{{ email }}" required autofocus autocomplete="email"
                 class="input-field" placeholder="o-seu@email.ao"/>
        </div>
        <div>
          <label for="password" class="block text-xs font-semibold uppercase tracking-widest mb-2" style="color:rgba(255,255,255,.4);letter-spacing:.1em;">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="current-password"
                 class="input-field" placeholder="••••••••"/>
        </div>
        <div class="flex items-center gap-2.5">
          <input type="checkbox" id="remember" name="remember" value="1" class="w-4 h-4 rounded accent-teal-500 cursor-pointer"/>
          <label for="remember" class="text-sm cursor-pointer" style="color:rgba(255,255,255,.45);">Manter sessão iniciada</label>
        </div>
        <button type="submit" class="btn-primary w-full py-3.5 mt-2">Entrar na conta</button>
        <p class="text-center text-sm" style="color:rgba(255,255,255,.38);">
          Não tem conta?
          <a href="{{ url_for('auth.register') }}" class="font-semibold transition-colors" style="color:#5ecec4;" onmouseover="this.style.color='#2a9d8f';" onmouseout="this.style.color='#5ecec4';">Registar</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
